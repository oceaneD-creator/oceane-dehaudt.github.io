<!-- HERO BACKGROUND -->
<div class="cyber-bg">
  <div class="grid"></div>
  <div class="gradient"></div>
  <div class="particles"></div>

  <!-- DATA FLOW -->
  <div class="flow flow-1"></div>
  <div class="flow flow-2"></div>
  <div class="flow flow-3"></div>

  <!-- SERVER LIGHTS -->
  <div class="server-glow left"></div>
  <div class="server-glow right"></div>

  <!-- FLOATING DATA -->
  <div class="floating-data data-1">SECURE CONNECTION</div>
  <div class="floating-data data-2">THREAT ANALYSIS ACTIVE</div>
  <div class="floating-data data-3">MONITORING NETWORK</div>
</div>

<style>

/* =========================
   GLOBAL
========================= */

body{
    background:#050505;
    overflow-x:hidden;
}

/* =========================
   MAIN CYBER BACKGROUND
========================= */

.cyber-bg{
    position:fixed;
    inset:0;
    z-index:-1;
    overflow:hidden;
    background:
    radial-gradient(circle at top,
    rgba(90,0,25,0.35),
    transparent 45%),
    #050505;
}

/* =========================
   GRID
========================= */

.grid{
    position:absolute;
    inset:0;

    background-image:
    linear-gradient(rgba(120,20,45,0.12) 1px, transparent 1px),
    linear-gradient(90deg, rgba(120,20,45,0.12) 1px, transparent 1px);

    background-size:60px 60px;

    opacity:0.35;
}

/* =========================
   BORDEAUX AMBIANCE
========================= */

.gradient{
    position:absolute;
    width:100%;
    height:100%;

    background:
    radial-gradient(circle at 20% 30%,
    rgba(120,0,35,0.25),
    transparent 25%),

    radial-gradient(circle at 80% 70%,
    rgba(90,0,25,0.25),
    transparent 30%),

    radial-gradient(circle at center,
    rgba(255,0,80,0.05),
    transparent 45%);

    filter:blur(60px);
}

/* =========================
   DATA FLOW LINES
========================= */

.flow{
    position:absolute;
    width:180%;
    height:2px;

    background:linear-gradient(
    90deg,
    transparent,
    rgba(180,20,70,0.0),
    rgba(255,40,100,0.9),
    rgba(180,20,70,0.0),
    transparent);

    opacity:0.22;

    filter:blur(1px);
}

.flow-1{
    top:28%;
    left:-40%;
    transform:rotate(8deg);

    animation:flowMove1 18s linear infinite;
}

.flow-2{
    top:56%;
    left:-40%;
    transform:rotate(-5deg);

    animation:flowMove2 22s linear infinite;
}

.flow-3{
    top:78%;
    left:-40%;
    transform:rotate(3deg);

    animation:flowMove3 26s linear infinite;
}

@keyframes flowMove1{
    0%{ transform:translateX(-10%) rotate(8deg);}
    100%{ transform:translateX(10%) rotate(8deg);}
}

@keyframes flowMove2{
    0%{ transform:translateX(10%) rotate(-5deg);}
    100%{ transform:translateX(-10%) rotate(-5deg);}
}

@keyframes flowMove3{
    0%{ transform:translateX(-5%) rotate(3deg);}
    100%{ transform:translateX(10%) rotate(3deg);}
}

/* =========================
   SERVER ROOM LIGHTS
========================= */

.server-glow{
    position:absolute;
    top:0;
    width:180px;
    height:100%;

    background:linear-gradient(
    to bottom,
    rgba(255,40,100,0.14),
    transparent 20%,
    rgba(255,40,100,0.08),
    transparent 70%);

    filter:blur(18px);

    animation:pulseGlow 4s ease-in-out infinite;
}

.server-glow.left{
    left:0;
}

.server-glow.right{
    right:0;
}

@keyframes pulseGlow{
    0%,100%{
        opacity:0.45;
    }

    50%{
        opacity:0.85;
    }
}

/* =========================
   FLOATING DATA TEXT
========================= */

.floating-data{
    position:absolute;

    color:rgba(255,90,140,0.28);

    font-size:11px;
    letter-spacing:4px;

    font-family:monospace;

    text-transform:uppercase;

    animation:floating 12s ease-in-out infinite;
}

.data-1{
    top:22%;
    left:12%;
}

.data-2{
    top:58%;
    right:10%;
}

.data-3{
    bottom:14%;
    left:20%;
}

@keyframes floating{
    0%,100%{
        transform:translateY(0px);
        opacity:0.25;
    }

    50%{
        transform:translateY(-10px);
        opacity:0.5;
    }
}

/* =========================
   PARTICLES
========================= */

.particles::before,
.particles::after{
    content:"";

    position:absolute;
    inset:0;

    background-image:
    radial-gradient(circle,
    rgba(255,90,140,0.7) 1px,
    transparent 1px);

    background-size:140px 140px;

    opacity:0.08;

    animation:particlesMove 50s linear infinite;
}

.particles::after{
    background-size:200px 200px;

    opacity:0.04;

    animation-duration:80s;
}

@keyframes particlesMove{
    from{
        transform:translateY(0);
    }

    to{
        transform:translateY(-200px);
    }
}

/* =========================
   CARD IMPROVEMENTS
========================= */

.card,
.skill-card,
.cert-card{
    background:rgba(8,8,8,0.82) !important;

    backdrop-filter:blur(10px);

    border:1px solid rgba(255,70,120,0.12);

    box-shadow:
    0 0 0 rgba(255,0,80,0),
    0 0 35px rgba(80,0,20,0.25);

    transition:0.35s ease;
}

.card:hover,
.skill-card:hover,
.cert-card:hover{

    transform:translateY(-4px);

    border:1px solid rgba(255,90,140,0.3);

    box-shadow:
    0 0 18px rgba(255,40,100,0.18),
    0 0 50px rgba(80,0,20,0.35);
}

/* =========================
   TITLES
========================= */

h1,h2,h3{

    text-shadow:
    0 0 12px rgba(255,40,100,0.25);

}

/* =========================
   BUTTONS
========================= */

button,
.btn{

    background:linear-gradient(
    135deg,
    #5e001f,
    #a30038);

    border:none;

    box-shadow:
    0 0 18px rgba(255,40,100,0.2);

    transition:0.3s ease;
}

button:hover,
.btn:hover{

    transform:translateY(-2px);

    box-shadow:
    0 0 24px rgba(255,40,100,0.35);

}

/* =========================
   MOBILE
========================= */

@media(max-width:768px){

    .grid{
        background-size:40px 40px;
    }

    .floating-data{
        font-size:8px;
        letter-spacing:2px;
    }

    .server-glow{
        width:80px;
    }

    .flow{
        opacity:0.14;
    }
}

</style>
